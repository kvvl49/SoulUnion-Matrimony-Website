<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <link rel="stylesheet" href="payment.css">
</head>
<body>

<nav>

<h1>Soul❤️Union Matrimony</h1>

<button onclick="window.location.href='subscription.html'">
← Back
</button>

</nav>

<div class="container">

<h2>Complete Your Payment</h2>

<div class="amount">

<h3 id="plan"></h3>

<h1 id="price"></h1>

</div>

<form id="paymentForm">

<label>Card Holder Name</label>

<input
type="text"
id="holder"
placeholder="Enter Card Holder Name"
required>

<label>Card Number</label>

<input
type="text"
id="card"
maxlength="16"
placeholder="1234 5678 9012 3456"
required>

<label>Expiry Date</label>

<input
type="month"
id="expiry"
required>

<label>CVV</label>

<input
type="password"
id="cvv"
maxlength="3"
placeholder="123"
required>

<button type="submit">

Pay Now

</button>

</form>

</div>

<script src="payment.js"></script>

</body>
</html>
