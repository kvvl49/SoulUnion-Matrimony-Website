<body>
     <nav>
        <h1>Soul❤️Union Matrimony </h1>

    <div class="register-container">

        <h1>Soul❤️Union Portal</h1>
        <h2>Register</h2>

        <form id="registerForm">

            <label for="fname">Full Name</label>
            <input type="text" id="fname"
       name="fname" 
       pattern="[A-Za-z ]+"
       title="Only alphabets are allowed"  placeholder="Enter your full name" required>

            <fieldset>
                <legend>Gender</legend>

                <input type="radio" id="male" name="gender" value="Male" required>
                <label for="male">Male</label>

                <input type="radio" id="female" name="gender" value="Female">
                <label for="female">Female</label>

                <input type="radio" id="other" name="gender" value="Other">
                <label for="other">Other</label>
            </fieldset>

            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" required>

            <label for="mobile">Mobile Number</label>
            <input type="tel" id="mobile" placeholder="Enter 10-digit mobile number" required>

            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter your email" required>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password" required>

            <label for="cpassword">Confirm Password</label>
            <input type="password" id="cpassword" placeholder="Password should match with the entered password" required>

            <button type="submit">Register</button>
            <hr>
            <p>
    Already have an Account?
    <a href="login.html">Login Here</a>
</p>
        </form>

        <footer>
            <p>&copy; 2025 Soul❤️Union Portal</p>
        </footer>

    </div>
